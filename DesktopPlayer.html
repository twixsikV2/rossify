<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rossify - Desktop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-image: url('background.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 80px;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .nav-icons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .nav-icon {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .nav-icon:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .nav-icon.active {
            color: white;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        #library-btn {
            cursor: pointer;
        }

        .main-content {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        .player-container {
            display: flex;
            gap: 20px;
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .player-container.hidden {
            display: none;
        }

        .library-view {
            display: none;
            flex: 1;
            gap: 20px;
            overflow: hidden;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .library-view.active {
            display: flex;
        }

        .search-view {
            display: none;
            flex: 1;
            gap: 20px;
            overflow: hidden;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .search-view.active {
            display: flex;
        }

        .search-container-main {
            flex: 1;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            height: 100%;
            min-height: 0;
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .search-input {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
        }

        .search-buttons {
            display: flex;
            gap: 12px;
        }

        .search-btn-online,
        .search-btn-mytracks {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .search-btn-online:hover,
        .search-btn-mytracks:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .search-results-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 100px;
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .search-result-item {
            display: flex;
            gap: 16px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            align-items: center;
        }

        .search-result-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .search-result-cover {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            object-fit: cover;
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .search-result-info {
            flex: 1;
            min-width: 0;
        }

        .search-result-name {
            font-weight: 500;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .search-result-artist {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-empty {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
        }

        .recommended-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .recommended-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            margin: 0;
        }

        .recommended-tracks {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
        }

        .recommended-track {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .recommended-track:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-4px);
        }

        .recommended-cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            object-fit: cover;
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .recommended-name {
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .recommended-artist {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .library-list {
            flex: 0 0 500px;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        .library-list::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 0;
            bottom: 0;
            width: 16px;
            cursor: col-resize;
            background: transparent;
        }

        .library-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .library-item {
            display: flex;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-items: flex-start;
        }

        .library-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .library-item.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .library-item-cover {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            object-fit: cover;
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .library-item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .library-item-name {
            font-weight: 500;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .library-item-artist {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .library-preview {
            flex: 0 0 350px;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .library-album-art {
            width: 280px;
            height: 280px;
            border-radius: 20px;
            object-fit: cover;
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: block;
            border-radius: 20px;
            overflow: hidden;
        }

        .library-album-container {
            width: 280px;
            height: 280px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .library-info {
            text-align: center;
        }

        .library-info-name {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .library-info-artist {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .library-bottom-player {
            position: fixed;
            bottom: 0;
            left: 80px;
            right: 0;
            height: 80px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            z-index: 100;
        }

        .library-player-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .library-player-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .library-player-btn:hover {
            color: white;
        }

        .library-player-info {
            flex: 0 1 250px;
            min-width: 0;
        }

        .library-player-track {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .library-player-artist {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .library-player-progress {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 200px;
        }

        .library-player-time {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            min-width: 30px;
            flex-shrink: 0;
        }

        .library-player-bar {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
            overflow: hidden;
        }

        .library-player-fill {
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            width: 0%;
        }

        .library-player-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .library-header-title {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }

        .library-tabs {
            display: flex;
            gap: 12px;
            flex: 1;
        }

        .library-tab {
            padding: 8px 16px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .library-tab:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .library-tab.active {
            color: white;
            border-bottom-color: rgba(255, 255, 255, 0.8);
        }

        .library-controls {
            display: flex;
            gap: 8px;
        }

        .sort-btn, .repeat-btn {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .sort-btn:hover, .repeat-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
        }

        .sort-btn.active, .repeat-btn.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .sort-menu, .repeat-menu {
            display: none;
            position: absolute;
            background: rgba(15, 15, 15, 0.5);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 8px;
            z-index: 200;
            min-width: 150px;
        }

        .sort-menu.active, .repeat-menu.active {
            display: block;
        }

        .menu-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .menu-item.active {
            background: rgba(255, 255, 255, 0.12);
            color: white;
        }

        .center-panel {
            flex: 1;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .album-art-container {
            position: relative;
            width: 280px;
            height: 280px;
        }

        .album-art {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .album-art:hover {
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .track-info {
            text-align: center;
            width: 100%;
        }

        .track-name {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .track-artist {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            width: 100%;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            width: 0%;
            transition: width 0.1s linear;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
        }

        .control-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.95);
            cursor: pointer;
            transition: all 0.2s;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .control-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 24px;
        }

        .play-btn:hover {
            background: rgba(255, 255, 255, 0.28);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .right-panel {
            width: 280px;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .visualizer-title {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }

        .visualizer {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            min-height: 200px;
        }

        .bar {
            width: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 3px;
            min-height: 4px;
            transition: height 0.6s ease-out;
        }

        .playlist-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .playlist-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .bottom-controls {
            display: flex;
            gap: 12px;
        }

        .bottom-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8rem;
        }

        .bottom-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
        }

        .playlist-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .playlist-modal.active {
            display: flex;
        }

        .playlist-content {
            background: rgba(15, 15, 15, 0.5);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .playlist-header {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 28px;
            cursor: pointer;
            transition: color 0.2s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: white;
        }

        .playlist-item {
            padding: 14px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .playlist-item.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .info-modal {
            display: none;
            position: fixed;

    <script>
        let currentLanguage = localStorage.getItem('language') || 'en';
        let translations = {};

        // Загружаем переводы из JSON
        async function loadTranslations() {
            try {
                const response = await fetch('languages.json');
                translations = await response.json();
                updateLanguage(currentLanguage);
            } catch (e) {
                console.error('Error loading translations:', e);
            }
        }

        function t(key) {
            return translations[currentLanguage]?.[key] || translations['en']?.[key] || key;
        }

        function updateLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('language', lang);
            
            // Обновляем все элементы с data-i18n атрибутом
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                    el.placeholder = t(key);
                } else if (el.tagName === 'BUTTON' || el.tagName === 'A') {
                    el.innerText = t(key);
                } else {
                    el.innerText = t(key);
                }
            });
            
            // Обновляем title атрибуты
            document.querySelectorAll('[data-i18n-title]').forEach(el => {
                const key = el.dataset.i18nTitle;
                el.title = t(key);
            });
            
            // Обновляем кнопки языка
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                }
            });
        }

        let songs = [];
        let currentIdx = 0, isPlaying = false;
        let currentDisplayIdx = 0; // Индекс в текущем массиве (Online или My Tracks)
        const player = document.getElementById('audio-player');
        const albumArt = document.getElementById('album-art');
        const trackName = document.getElementById('track-name');
        const trackArtist = document.getElementById('track-artist');
        const playPauseBtn = document.getElementById('play-pause');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationDisplay = document.getElementById('duration');
        const progressBar = document.querySelector('.progress-bar');
        const playlistModal = document.getElementById('playlist-modal');
        const closePlaylistBtn = document.getElementById('close-playlist');
        const openPlaylistBtn = document.getElementById('open-playlist');
        const playlistList = document.getElementById('playlist-list');
        const visualizer = document.getElementById('visualizer');

        let sortMode = 'default';
        let repeatMode = 'off';
        let displayedSongs = [];
        let currentTab = 'online';
        let searchQuery = '';
        let searchFilter = 'all';
        let myTracks = [];

        // Загружаем myTracks из localStorage
        function loadMyTracks() {
            const saved = localStorage.getItem('rossify_mytracks');
            if (saved) {
                try {
                    myTracks = JSON.parse(saved);
                } catch (e) {
                    myTracks = [];
                }
            }
        }

        // Сохраняем myTracks в localStorage
        function saveMyTracks() {
            localStorage.setItem('rossify_mytracks', JSON.stringify(myTracks));
        }

        // Экспортируем конфиг
        function exportConfig() {
            const config = {
                myTracks: myTracks,
                timestamp: new Date().toISOString()
            };
            const dataStr = JSON.stringify(config, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `rossify-config-${Date.now()}.json`;
            link.click();

        // Импортируем конфиг
        function importConfig(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const config = JSON.parse(e.target.result);
                    if (config.myTracks && Array.isArray(config.myTracks)) {
                        myTracks = config.myTracks;
                        saveMyTracks();
                        alert('Config imported successfully!');
                        if (currentTab === 'mytracks') {
                            renderLibrary();
                        }
                    }
                } catch (err) {
                    alert('Error importing config: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function formatTime(s) {
            if (!s || isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        function decodeUrl(encoded) {
            try {
                const decoded = atob(encoded);
                return decodeURIComponent(decoded);
            } catch (e) {
                return encoded;
            }
        }

        let songBlobCache = {};

        async function loadImageAsBlob(url, artist = null, trackList = null) {
            try {
                if (songBlobCache[url]) {
                    return songBlobCache[url];
                }
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to load image');
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                songBlobCache[url] = blobUrl;
                return blobUrl;
            } catch (e) {
                // Пробуем альтернативные форматы: jpg -> png -> jpeg
                const formats = ['.jpg', '.png', '.jpeg'];
                let baseUrl = url;
                
                // Определяем текущий формат и удаляем его
                for (const fmt of formats) {
                    if (url.toLowerCase().endsWith(fmt)) {
                        baseUrl = url.substring(0, url.length - fmt.length);
                        break;
                    }
                }
                
                // Пробуем каждый формат молча (без ошибок в консоль)
                for (const fmt of formats) {
                    if (!url.toLowerCase().endsWith(fmt)) {
                        try {
                            const alternateUrl = baseUrl + fmt;
                            const response = await fetch(alternateUrl, { signal: AbortSignal.timeout(3000) });
                            if (response.ok) {
                                const blob = await response.blob();
                                const blobUrl = URL.createObjectURL(blob);
                                songBlobCache[alternateUrl] = blobUrl;
                                return blobUrl;
                            }
                        } catch (e2) {
                            // Молча пропускаем ошибку
                        }
                    }
                }
                
                // Если есть исполнитель и список треков, ищем обложку другого трека того же исполнителя
                if (artist && trackList) {
                    const fallbackSong = trackList.find(s => s.artist === artist && s.img !== url);
                    if (fallbackSong) {
                        try {
                            const fallbackUrl = decodeUrl(fallbackSong.img);
                            if (songBlobCache[fallbackUrl]) {
                                return songBlobCache[fallbackUrl];
                            }
                            const response = await fetch(fallbackUrl);
                            if (response.ok) {
                                const blob = await response.blob();
                                const blobUrl = URL.createObjectURL(blob);
                                songBlobCache[fallbackUrl] = blobUrl;
                                return blobUrl;
                            }
                        } catch (e2) {
                            // Fallback тоже не загрузился
                        }
                    }
                }
                return url;
            }
        }

                    </svg>

                `;

        function playSong(song) {
            // Находим индекс трека в текущем списке
            let trackList = currentTab === 'mytracks' ? myTracks : songs;
            currentDisplayIdx = trackList.findIndex(s => s.name === song.name && s.artist === song.artist);
            
            // Находим индекс в основном массиве songs для currentIdx
            currentIdx = songs.findIndex(s => s.name === song.name && s.artist === song.artist);
            if (currentIdx === -1) currentIdx = 0;
            
            // Просто устанавливаем источник
            player.src = song.file;
            
            trackName.innerText = song.name;
            trackArtist.innerText = song.artist;
            document.getElementById('bottom-artist').innerText = song.artist;
            
            // Обновляем длительность
            if (player.duration && !isNaN(player.duration)) {
                durationDisplay.innerText = formatTime(player.duration);
            } else {
                player.onloadedmetadata = () => {
                    durationDisplay.innerText = formatTime(player.duration);
                };
            }
            
            // Загружаем обложку
            if (song.img.startsWith('data:') || song.img.startsWith('blob:')) {
                albumArt.src = song.img;
                document.getElementById('library-album-art').src = song.img;
            } else {
                loadImageAsBlob(decodeUrl(song.img)).then(blobUrl => {
                    albumArt.src = blobUrl;
                    document.getElementById('library-album-art').src = blobUrl;
                });
            }
            
            albumArt.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
            
            player.play();
            isPlaying = true;
            updatePlayButton();
            renderPlaylist();
            
            document.getElementById('library-info-name').innerText = song.name;
            document.getElementById('library-info-artist').innerText = song.artist;
            
            renderLibrary();
        }

        function loadTrack(idx) {

            if (idx < 0 || idx >= trackList.length) return;
            
            const song = trackList[idx];
            currentDisplayIdx = idx; // Сохраняем индекс в текущем массиве
            
            // Находим индекс в основном массиве songs для currentIdx
            if (currentTab === 'online') {
                currentIdx = idx;
            } else {
                // Для My Tracks ищем индекс в основном массиве
                currentIdx = songs.findIndex(s => s.name === song.name && s.artist === song.artist);
                if (currentIdx === -1) currentIdx = 0;
            }
            
            player.src = decodeUrl(song.file);
            
            // Загружаем картинку через blob
            loadImageAsBlob(decodeUrl(song.img)).then(blobUrl => {
                albumArt.src = blobUrl;
            });
            
            trackName.innerText = song.name;
            trackArtist.innerText = song.artist;
            document.getElementById('bottom-artist').innerText = song.artist;
            
            // Обновляем длительность когда метаданные загружены
            if (player.duration && !isNaN(player.duration)) {
                durationDisplay.innerText = formatTime(player.duration);
            } else {

            document.getElementById('lib-track-name').innerText = song.name;
            document.getElementById('lib-track-artist').innerText = song.artist;
            document.getElementById('lib-duration').innerText = formatTime(song.duration);
            
            if (player.duration && !isNaN(player.duration)) {
                document.getElementById('lib-progress-fill').style.width = (player.currentTime / player.duration * 100) + '%';
                document.getElementById('lib-current-time').innerText = formatTime(player.currentTime);
            }
        };

        player.addEventListener('timeupdate', updateLibPlayer);
        player.addEventListener('play', () => {
            updateLibPlayer();
            document.getElementById('lib-play').innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>';
        });
        player.addEventListener('pause', () => {
            document.getElementById('lib-play').innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
        });

        // Сортировка и режимы
        document.getElementById('sort-btn').onclick = () => {
            document.getElementById('sort-menu').classList.toggle('active');
        };

        document.getElementById('repeat-btn').onclick = () => {
            document.getElementById('repeat-menu').classList.toggle('active');
        };

        document.querySelectorAll('#sort-menu .menu-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('#sort-menu .menu-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                sortMode = item.dataset.sort;
                sortSongs();
                renderLibrary();
                document.getElementById('sort-menu').classList.remove('active');
            };
        });

        document.querySelectorAll('#repeat-menu .menu-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('#repeat-menu .menu-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                repeatMode = item.dataset.repeat;
                document.getElementById('repeat-menu').classList.remove('active');
            };
        });

        // Закрытие меню при клике вне
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#sort-btn') && !e.target.closest('#sort-menu')) {
                document.getElementById('sort-menu').classList.remove('active');
            }
            if (!e.target.closest('#repeat-btn') && !e.target.closest('#repeat-menu')) {
                document.getElementById('repeat-menu').classList.remove('active');
            }
            if (!e.target.closest('#context-menu') && !e.target.closest('.library-item')) {
                document.getElementById('context-menu').classList.remove('active');
            }
        });

        // Кнопка repeat в мини-плеере
        document.getElementById('lib-repeat-btn').onclick = () => {
            const modes = ['off', 'one', 'all', 'shuffle'];
            const currentIndex = modes.indexOf(repeatMode);
            repeatMode = modes[(currentIndex + 1) % modes.length];
            updateRepeatButton();
        };

        updateRepeatButton();

        function updateRepeatButton() {
            const btn = document.getElementById('lib-repeat-btn');
            if (repeatMode === 'off') {
                btn.style.color = 'rgba(255, 255, 255, 0.5)';
                btn.title = 'Repeat: Off';
                btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 2 21 6 17 10"></polyline><path d="M3 11v-1a4 4 0 0 1 4-4h14"></path><polyline points="7 22 3 18 7 14"></polyline><path d="M21 13v1a4 4 0 0 1-4 4H3"></path></svg>';
            } else if (repeatMode === 'one') {
                btn.style.color = 'rgba(100, 150, 255, 0.9)';
                btn.title = 'Repeat: One';
                btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 2 21 6 17 10"></polyline><path d="M3 11v-1a4 4 0 0 1 4-4h14"></path><polyline points="7 22 3 18 7 14"></polyline><path d="M21 13v1a4 4 0 0 1-4 4H3"></path><text x="9" y="16" font-size="8" font-weight="bold">1</text></svg>';
            } else if (repeatMode === 'all') {
                btn.style.color = 'rgba(100, 150, 255, 0.9)';
                btn.title = 'Repeat: All';
                btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 2 21 6 17 10"></polyline><path d="M3 11v-1a4 4 0 0 1 4-4h14"></path><polyline points="7 22 3 18 7 14"></polyline><path d="M21 13v1a4 4 0 0 1-4 4H3"></path></svg>';
            } else if (repeatMode === 'shuffle') {
                btn.style.color = 'rgba(100, 150, 255, 0.9)';
                btn.title = 'Repeat: Shuffle';
                btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 17 21 3 3 3"></polyline><polyline points="3 21 3 7 21 7"></polyline></svg>';
            }
        }

        // Resizable library list
        const libraryList = document.getElementById('library-list');
        const libraryView = document.getElementById('library-view');
        let isResizing = false;
        let startX = 0;
        let startWidth = 0;

        libraryView.addEventListener('mousedown', (e) => {
            const rect = libraryList.getBoundingClientRect();
            if (e.clientX > rect.right - 10 && e.clientX < rect.right + 10) {
                isResizing = true;
                startX = e.clientX;
                startWidth = libraryList.offsetWidth;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const diff = e.clientX - startX;
            const newWidth = Math.max(300, startWidth + diff);
            libraryList.style.flex = `0 0 ${newWidth}px`;
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
            document.body.style.userSelect = 'auto';
        });

        playlistModal.onclick = (e) => {
            if (e.target === playlistModal) playlistModal.classList.remove('active');
        };

        createVisualizer();

        // Обработчики вкладок
        document.getElementById('tab-online').onclick = () => {
            currentTab = 'online';
            displayedSongs = [...songs];
            currentDisplayIdx = currentIdx;
            document.querySelectorAll('.library-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-online').classList.add('active');
            sortSongs();
            renderLibrary();
        };

        document.getElementById('tab-mytracks').onclick = () => {
            currentTab = 'mytracks';
            displayedSongs = [...myTracks];
            currentDisplayIdx = 0;
            document.querySelectorAll('.library-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-mytracks').classList.add('active');
            sortSongs();
            renderLibrary();
        };

        // Обработчики экспорта/импорта
        document.getElementById('export-btn').onclick = exportConfig;
        document.getElementById('import-btn').onclick = () => {
            document.getElementById('import-file').click();
        };
        document.getElementById('import-file').onchange = (e) => {
            if (e.target.files[0]) {
                importConfig(e.target.files[0]);
                e.target.value = '';
            }
        };

        // Загружаем myTracks из localStorage
        loadMyTracks();

        // Обработка ориентации экрана
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                window.scrollTo(0, 0);
                document.body.style.overflow = 'hidden';
                document.body.style.overflow = 'auto';
            }, 100);
        });

        // Предотвращение масштабирования на двойной клик
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Оптимизация для сенсорных устройств
        if ('ontouchstart' in window) {
            document.body.classList.add('touch-device');
            
            // Увеличиваем зоны нажатия для кнопок
            const buttons = document.querySelectorAll('button, .nav-icon, .library-item, .search-result-item');
            buttons.forEach(btn => {
                btn.style.minHeight = '44px';
                btn.style.minWidth = '44px';
            });
        }

        // Обработка viewport для планшетов
        const viewport = document.querySelector('meta[name="viewport"]');
        if (viewport) {
            viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover');
        }

        // Загружаем локальный файл
        async function handleLocalFileUpload(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const blob = new Blob([arrayBuffer], { type: file.type });
                const blobUrl = URL.createObjectURL(blob);
                
                // Получаем метаданные
                const audio = new Audio();
                audio.src = blobUrl;
                
                const duration = await new Promise((resolve) => {
                    audio.onloadedmetadata = () => resolve(Math.round(audio.duration) || 0);
                    setTimeout(() => resolve(0), 5000);
                });
                
                const fileName = file.name.replace(/\.[^/.]+$/, '');
                
                // Генерируем обложку с градиентом
                const canvas = document.createElement('canvas');
                canvas.width = 200;
                canvas.height = 200;
                const ctx = canvas.getContext('2d');
                
                const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                ctx.fillStyle = color;
                ctx.fillRect(0, 0, 200, 200);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(fileName.substring(0, 20), 100, 100);
                
                const imgUrl = canvas.toDataURL('image/png');
                
                // Добавляем в myTracks
                myTracks.push({
                    name: fileName,
                    artist: 'Local File',
                    file: blobUrl,
                    img: imgUrl,
                    duration: duration,
                    isLocal: true
                });
                
                saveMyTracks();
                renderLibrary();
                
                return { name: fileName, file: blobUrl, img: imgUrl, duration };
            } catch (error) {
                console.error('Error loading local file:', error);
                alert('Error loading file: ' + error.message);
            }
        }

        // Обработчик кнопки загрузки локальных файлов
        document.getElementById('upload-local-btn').onclick = () => {
            document.getElementById('local-file-input').click();
        };

        document.getElementById('local-file-input').onchange = async (e) => {
            const files = e.target.files;
            if (files.length === 0) return;
            
            for (let file of files) {
                await handleLocalFileUpload(file);
            }
            
            e.target.value = '';
        };

        // Обработчик кнопки очистки
        document.getElementById('clear-cache-btn').onclick = () => {
            if (confirm('Remove all local files?')) {
                myTracks = myTracks.filter(t => !t.isLocal);
                saveMyTracks();
                renderLibrary();
                alert('Local files removed!');
            }
        };

        // Загружаем данные из sounds.json
        fetch('sounds.json?v=' + Date.now())
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                songs = data.songs;
                displayedSongs = [...songs];
                console.log('Загружено песен:', songs.length);
                if (songs.length > 0) {
                    loadTrack(0);
                    sortSongs();
                    updateLibraryPreview(0);
                }
            })
            .catch(error => {
                console.error('Ошибка загрузки sounds.json:', error);
            });
    </script>
</body>
</html>
